<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こづかいノート</title>
<meta name="theme-color" content="#0F2A22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="こづかい">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  /* 共通（緑：おとうさん・おかあさん用 / 既定） */
  :root{
    --bg:#0F2A22;--panel:#163A2F;--panel2:#1C4639;--line:#27574699;
    --glow:#1C4639;
    --ink:#EAF4EE;--sub:#9DC4B2;--gold:#F2C14E;--gold-deep:#D89B2A;
    --leaf:#5FD68A;--coral:#F2785C;--shadow:0 8px 24px rgba(0,0,0,.35);
    --vault-a:#1F4E40;--vault-b:#143229;
  }
  /* REIA:青系 */
  body[data-theme="R"]{
    --bg:#0E1F33;--panel:#15273F;--panel2:#1B3150;--line:#2C4A7099;
    --glow:#1B3150;--sub:#9DB6D6;--gold:#5BB8FF;--gold-deep:#2E8FE0;
    --leaf:#5FD0FF;--coral:#F2785C;
    --vault-a:#1C3E63;--vault-b:#10243D;
  }
  /* KAKUMA:紫系 */
  body[data-theme="K"]{
    --bg:#221033;--panel:#2D1748;--panel2:#371D58;--line:#4A2C7099;
    --glow:#371D58;--sub:#C2A7E0;--gold:#C98BFF;--gold-deep:#A45BE0;
    --leaf:#D08BFF;--coral:#F2785C;
    --vault-a:#3A1F5C;--vault-b:#26113D;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--glow) 0%,var(--bg) 55%);
    color:var(--ink);min-height:100vh;padding-bottom:90px;transition:background .4s;}
  .wrap{max-width:560px;margin:0 auto;padding:16px;}
  header{padding:18px 4px 8px;}
  .titlerow{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;}
  .title{font-size:13px;letter-spacing:.3em;color:var(--sub);margin:0;}
  .sync{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:5px;}
  .sync .d{width:7px;height:7px;border-radius:50%;background:#6f8c7e;}
  .sync.ok .d{background:var(--leaf);} .sync.busy .d{background:var(--gold);animation:bl .8s infinite;}
  .sync.err .d{background:var(--coral);}
  @keyframes bl{50%{opacity:.3}}
  .who{display:flex;gap:8px;flex-wrap:wrap;}
  .who button{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--sub);
    padding:12px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;
    display:flex;align-items:center;justify-content:center;gap:7px;}
  .who button .dot{width:9px;height:9px;border-radius:50%;background:currentColor;opacity:.5;}
  .who button.active{color:var(--ink);border-color:var(--gold);background:linear-gradient(180deg,var(--panel2),var(--panel));box-shadow:var(--shadow);}
  .who button.active .dot{opacity:1;background:var(--gold);}
  .vault{margin-top:16px;background:linear-gradient(165deg,var(--vault-a),var(--vault-b));border:1px solid var(--line);
    border-radius:24px;padding:22px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .vault::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
    background:radial-gradient(circle,var(--gold) 0%,transparent 70%);opacity:.12;}
  .vault .lab{font-size:13px;color:var(--sub);letter-spacing:.1em;}
  .vault .amt{font-size:46px;font-weight:800;margin:4px 0 2px;letter-spacing:-.02em;}
  .vault .amt .yen{font-size:22px;color:var(--gold);margin-left:4px;}
  .vault .flow{display:flex;gap:18px;margin-top:10px;font-size:13px;}
  .vault .flow b{font-size:16px;display:block;font-weight:700;}
  .vault .in b{color:var(--leaf);} .vault .out b{color:var(--coral);}
  .goals{margin-top:18px;}
  .sec-h{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;}
  .sec-h h2{font-size:16px;margin:0;font-weight:700;}
  .sec-h .add{background:none;border:none;color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;}
  .goal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;}
  .goal .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .goal .nm{font-weight:700;font-size:16px;}
  .goal .nums{font-size:13px;color:var(--sub);white-space:nowrap;}
  .goal .nums b{color:var(--ink);}
  .bar{height:12px;background:var(--bg);border-radius:8px;margin:10px 0 6px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--leaf),var(--gold));border-radius:8px;transition:width .5s;}
  .goal .short{font-size:13px;} .goal .short.done{color:var(--leaf);font-weight:700;} .goal .short.lack{color:var(--gold);}
  .goal .del{float:right;background:none;border:none;color:#6f8c7e;font-size:12px;cursor:pointer;}
  .log{margin-top:22px;}
  .row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin-bottom:8px;}
  .row .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .row.income .ic{background:var(--panel2);} .row.expense .ic{background:#46261f;}
  .row .mid{flex:1;min-width:0;}
  .row .mid .t{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .mid .d{font-size:12px;color:var(--sub);}
  .row .amt{font-weight:700;font-size:16px;white-space:nowrap;}
  .row.income .amt{color:var(--leaf);} .row.expense .amt{color:var(--coral);}
  .row .thumb{width:34px;height:34px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--line);}
  .row .x{background:none;border:none;color:#5f7a6c;font-size:18px;cursor:pointer;padding:4px;}
  .empty{text-align:center;color:var(--sub);padding:30px 10px;font-size:14px;}
  .fab{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex;gap:10px;max-width:560px;margin:0 auto;background:linear-gradient(180deg,transparent,var(--bg) 40%);}
  .fab button{flex:1;border:none;padding:16px;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);}
  .fab .bin{background:linear-gradient(180deg,var(--leaf),#3DBE6F);color:#08271a;}
  .fab .bout{background:linear-gradient(180deg,var(--coral),#E25538);color:#fff;}
  .ov{position:fixed;inset:0;background:rgba(6,18,14,.7);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .ov.on{display:flex;}
  .sheet{background:var(--panel2);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));border:1px solid var(--line);border-bottom:none;animation:up .25s;}
  @keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 0 16px;font-size:18px;}
  label{display:block;font-size:13px;color:var(--sub);margin:12px 0 6px;}
  input,select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:13px;border-radius:12px;font-size:16px;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chips button{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:9px 14px;border-radius:20px;font-size:14px;cursor:pointer;font-family:inherit;}
  .chips button.sel{background:var(--gold);color:#1a1208;border-color:var(--gold);font-weight:700;}
  .recip{margin-top:6px;}
  .recip .pick{display:flex;align-items:center;gap:12px;border:1px dashed var(--line);border-radius:12px;padding:12px;cursor:pointer;}
  .recip img{width:54px;height:54px;border-radius:8px;object-fit:cover;}
  .recip .pick span{color:var(--sub);font-size:14px;}
  .acts{display:flex;gap:10px;margin-top:20px;}
  .acts button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;}
  .acts .cancel{background:var(--panel);color:var(--sub);border:1px solid var(--line);}
  .acts .ok{background:var(--gold);color:#1a1208;}
  .acts .ok:disabled{opacity:.5;}
  .viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .viewer.on{display:flex;} .viewer img{max-width:100%;max-height:90vh;border-radius:10px;}
  .stamp{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:70;pointer-events:none;}
  .stamp.on{display:flex;} .stamp .b{font-size:80px;animation:pop .9s ease;}
  @keyframes pop{0%{transform:scale(0) rotate(-30deg);opacity:0}40%{transform:scale(1.3) rotate(10deg);opacity:1}70%{transform:scale(1) rotate(0)}100%{transform:scale(1.1);opacity:0}}
  /* 初回設定 */
  .setup{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:90;padding:24px;}
  .setup.on{display:flex;}
  .setup .card{max-width:420px;width:100%;}
  .setup h2{font-size:20px;margin:0 0 8px;} .setup p{color:var(--sub);font-size:13px;line-height:1.7;margin:0 0 16px;}
  .setup button{width:100%;margin-top:16px;padding:15px;border:none;border-radius:14px;background:var(--gold);color:#1a1208;font-size:16px;font-weight:800;cursor:pointer;}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:#0a1f17;border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:12px;font-size:14px;z-index:80;opacity:0;transition:.3s;pointer-events:none;}
  .toast.on{opacity:1;}
  /* かくまアプリ連携バナー(v1.45新規) */
  .from-kakuma{margin:14px 0;background:linear-gradient(135deg,#FF6F00,#E65100);
    color:#fff;border-radius:14px;padding:12px 14px;font-size:13px;font-weight:700;
    box-shadow:0 2px 8px rgba(230,81,0,.4);display:none;}
  .from-kakuma.on{display:block;animation:up .4s;}
  .from-kakuma .big{font-size:18px;font-weight:900;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlerow">
      <p class="title">こづかいノート</p>
      <div class="sync" id="sync"><span class="d"></span><span id="syncTxt">…</span></div>
    </div>
    <div class="who" id="who"></div>
  </header>

  <!-- かくまアプリからの連携バナー(v1.45) -->
  <div class="from-kakuma" id="fromKakuma">
    🪙 かくまアプリから ママコインを げんきんに こうかんしたよ!<br>
    <span class="big" id="fromKakumaAmt"></span>
  </div>

  <div class="vault">
    <div class="lab">いま もっている おかね</div>
    <div class="amt"><span id="bal">0</span><span class="yen">円</span></div>
    <div class="flow">
      <div class="in">こんげつ ふえた<b id="mIn">+0</b></div>
      <div class="out">こんげつ つかった<b id="mOut">-0</b></div>
    </div>
  </div>

  <div class="goals">
    <div class="sec-h"><h2>ほしいもの</h2><button class="add" onclick="openGoal()">＋ ついか</button></div>
    <div id="goalList"></div>
  </div>

  <div class="log">
    <div class="sec-h"><h2>きろく</h2></div>
    <div id="logList"></div>
  </div>
</div>

<div class="fab">
  <button class="bin" onclick="openTx('income')">＋ おかねが入った</button>
  <button class="bout" onclick="openTx('expense')">－ つかった</button>
</div>

<div class="ov" id="txOv">
  <div class="sheet">
    <h3 id="txTitle"></h3>
    <label>なにに / どこから？</label>
    <div class="chips" id="catChips"></div>
    <input type="text" id="txNote" placeholder="メモ（れい：だがしやさん）" style="margin-top:10px;">
    <label>いくら？（円）</label>
    <input type="number" id="txAmt" inputmode="numeric" placeholder="0">
    <div class="recip" id="recipWrap" style="display:none;">
      <label>レシート（しゃしん・このスマホにだけ のこるよ）</label>
      <div class="pick" onclick="document.getElementById('recipFile').click()">
        <img id="recipPrev" style="display:none;">
        <span id="recipTxt">📷 しゃしんを とる / えらぶ</span>
      </div>
      <input type="file" id="recipFile" accept="image/*" capture="environment" style="display:none;" onchange="handleRecip(this)">
    </div>
    <div class="acts">
      <button class="cancel" onclick="closeTx()">やめる</button>
      <button class="ok" id="txOk" onclick="saveTx()">きろくする</button>
    </div>
  </div>
</div>

<div class="ov" id="goalOv">
  <div class="sheet">
    <h3>ほしいもの を ついか</h3>
    <label>なにが ほしい？</label>
    <input type="text" id="gName" placeholder="れい：ニンテンドースイッチ">
    <label>いくら？（円）</label>
    <input type="number" id="gPrice" inputmode="numeric" placeholder="0">
    <label>いつまでに ほしい？（いれなくてもOK）</label>
    <input type="date" id="gDue">
    <div class="acts">
      <button class="cancel" onclick="closeGoal()">やめる</button>
      <button class="ok" onclick="saveGoal()">きめる！</button>
    </div>
  </div>
</div>

<div class="viewer" id="viewer" onclick="this.classList.remove('on')"><img id="viewerImg"></div>
<div class="stamp" id="stamp"><div class="b">🌱</div></div>
<div class="toast" id="toast"></div>

<!-- 初回だけ：GASのURLを入れる画面 -->
<div class="setup" id="setup">
  <div class="card">
    <h2>さいしょの せってい</h2>
    <p>家族で きろくを 共有するために、GAS（Google）の URL を 1かいだけ 入れてね。お父さんが よういした「ウェブアプリの URL」を はりつけてください。</p>
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <button onclick="saveGasUrl()">つかいはじめる</button>
  </div>
</div>

<script>
/* =========================================================
   設定:家族の合言葉（GAS側と同じ文字列にする）
   ========================================================= */
const SHARED_KEY = "hyk-family-2026";
const KIDS=[{id:'R',name:'REIA'},{id:'K',name:'KAKUMA'}];

/* GASのURL(アプリに埋め込み済み。端末ごとの手入力は不要)
   ※ もし将来GASを作り直してURLが変わったら、下のDEFAULT_GAS_URLを差し替えるだけでOK */
const GAS_KEY='kakeibo-gas-url';
const DEFAULT_GAS_URL='https://script.google.com/macros/s/AKfycbw17DURzkl4YnRsj2WUFjw3RP_EOZ9_0DiZFP5NY7srI5rJl6DlsUXMD3u3PtXA9fSr4Q/exec';
let GAS_URL=localStorage.getItem(GAS_KEY)||DEFAULT_GAS_URL;

/* ===== IndexedDB(レシート写真:この端末だけ) ===== */
const DB='kakeibo-db',STORE='receipts';let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);
  r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE);};
  r.onsuccess=e=>{db=e.target.result;res();};r.onerror=()=>rej(r.error);});}
function putReceipt(id,blob){return new Promise((res,rej)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(blob,id);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
function getReceipt(id){return new Promise((res)=>{const t=db.transaction(STORE,'readonly');const q=t.objectStore(STORE).get(id);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);});}
function delReceipt(id){return new Promise((res)=>{const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=res;});}

/* ===== クラウド通信(GAS) ===== */
let DATA={tx:[],goals:[]}, current=KIDS[0].id;
function setSync(state,txt){const s=document.getElementById('sync');s.className='sync '+state;document.getElementById('syncTxt').textContent=txt;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1800);}

async function apiCall(action,payload){
  const body=JSON.stringify({key:SHARED_KEY,action,payload});
  const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body});
  if(!r.ok)throw new Error('http '+r.status);
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  return j;
}

async function pull(){
  setSync('busy','よみこみ中');
  try{
    const j=await apiCall('get',{});
    DATA.tx=j.tx||[]; DATA.goals=j.goals||[];
    setSync('ok','つながってるよ');
    render();
  }catch(e){
    setSync('err','つながらない');
    toast('読み込みに しっぱい:'+e.message);
    render();
  }
}

/* ===== 表示 ===== */
const INCOME_CATS=[['🏠','家のおてつだい'],['🧧','おとしだま'],['🎁','もらった'],['📦','メルカリ'],['✨','そのほか']];
const EXPENSE_CATS=[['🍬','おかし'],['🧸','おもちゃ'],['📚','ほん'],['🎮','ゲーム'],['✨','そのほか']];
function yen(n){return Number(n).toLocaleString('ja-JP');}
function thisMonth(d){const now=new Date();const t=new Date(Number(d));return t.getFullYear()===now.getFullYear()&&t.getMonth()===now.getMonth();}
function myTx(){return DATA.tx.filter(t=>t.kid===current);}
function myGoals(){return DATA.goals.filter(g=>g.kid===current);}

function render(){
  document.getElementById('who').innerHTML=KIDS.map(k=>
    `<button class="${k.id===current?'active':''}" onclick="switchKid('${k.id}')"><span class="dot"></span>${k.name}</button>`).join('');
  const tx=myTx();
  let bal=0,mIn=0,mOut=0;
  tx.forEach(t=>{const a=Number(t.amt);if(t.type==='income'){bal+=a;if(thisMonth(t.date))mIn+=a;}else{bal-=a;if(thisMonth(t.date))mOut+=a;}});
  document.getElementById('bal').textContent=yen(bal);
  document.getElementById('mIn').textContent='+'+yen(mIn);
  document.getElementById('mOut').textContent='-'+yen(mOut);

  const gl=document.getElementById('goalList');const gs=myGoals();
  if(!gs.length)gl.innerHTML='<div class="empty">ほしいものを ついかしてみよう</div>';
  else gl.innerHTML=gs.map(g=>{
    const pct=Math.min(100,Math.round(bal/Number(g.price)*100));
    const lack=Number(g.price)-bal;const done=lack<=0;
    let dueTxt='';
    if(g.due){
      const today=new Date();today.setHours(0,0,0,0);
      const due=new Date(g.due);due.setHours(0,0,0,0);
      const days=Math.round((due-today)/86400000);
      if(done) dueTxt='';
      else if(days>0) dueTxt=' ・ あと '+days+'日';
      else if(days===0) dueTxt=' ・ きょうまで！';
      else dueTxt=' ・ きげんすぎ';
    }
    return `<div class="goal">
      <button class="del" onclick="delGoal('${g.id}')">けす</button>
      <div class="top"><span class="nm">${g.name}</span>
        <span class="nums"><b>${yen(Math.max(0,Math.min(bal,Number(g.price))))}</b> / ${yen(g.price)}円</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="short ${done?'done':'lack'}">${done?'🎉 かえるよ！':'あと '+yen(lack)+'円'+dueTxt}</div>
    </div>`;}).join('');

  const ll=document.getElementById('logList');
  const sorted=[...tx].sort((a,b)=>Number(b.date)-Number(a.date));
  if(!sorted.length)ll.innerHTML='<div class="empty">まだ きろくが ないよ</div>';
  else ll.innerHTML=sorted.map(t=>{
    const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
    const ic=(cats.find(c=>c[1]===t.cat)||['💰'])[0];
    const dt=new Date(Number(t.date));const ds=`${dt.getMonth()+1}/${dt.getDate()}`;
    const thumb=t.recip?`<img class="thumb" data-rid="${t.recip}" onclick="showReceipt('${t.recip}')">`:'';
    return `<div class="row ${t.type}">
      <div class="ic">${ic}</div>
      <div class="mid"><div class="t">${t.note||t.cat}</div><div class="d">${ds}・${t.cat}</div></div>
      ${thumb}
      <div class="amt">${t.type==='income'?'+':'-'}${yen(t.amt)}</div>
      <button class="x" onclick="delTx('${t.id}')">×</button>
    </div>`;}).join('');
  document.querySelectorAll('.thumb[data-rid]').forEach(async img=>{const b=await getReceipt(img.dataset.rid);if(b)img.src=URL.createObjectURL(b);else img.style.display='none';});
}
function applyTheme(){
  if(current==='R'||current==='K')document.body.setAttribute('data-theme',current);
  else document.body.removeAttribute('data-theme');
}
function switchKid(id){current=id;applyTheme();render();}

/* ===== 取引 ===== */
let txType='income',selCat=null,pendingRecip=null;
function openTx(type){
  txType=type;selCat=null;pendingRecip=null;
  document.getElementById('txTitle').textContent=type==='income'?'おかねが 入った':'おかねを つかった';
  const cats=type==='income'?INCOME_CATS:EXPENSE_CATS;
  document.getElementById('catChips').innerHTML=cats.map(c=>`<button onclick="pickCat(this,'${c[1]}')">${c[0]} ${c[1]}</button>`).join('');
  document.getElementById('txNote').value='';document.getElementById('txAmt').value='';
  document.getElementById('recipWrap').style.display=type==='expense'?'block':'none';
  document.getElementById('recipPrev').style.display='none';
  document.getElementById('recipTxt').textContent='📷 しゃしんを とる / えらぶ';
  document.getElementById('txOv').classList.add('on');
}
function closeTx(){document.getElementById('txOv').classList.remove('on');}
function pickCat(el,cat){selCat=cat;document.querySelectorAll('#catChips button').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function handleRecip(inp){const f=inp.files[0];if(!f)return;pendingRecip=f;const url=URL.createObjectURL(f);const p=document.getElementById('recipPrev');p.src=url;p.style.display='block';document.getElementById('recipTxt').textContent='しゃしん OK！べつのに かえる？';}

async function saveTx(){
  const amt=parseInt(document.getElementById('txAmt').value,10);
  if(!selCat){alert('「なにに」を えらんでね');return;}
  if(!amt||amt<=0){alert('きんがくを 入れてね');return;}
  const id='t'+Date.now()+Math.random().toString(36).slice(2,6);
  let recipId=null;
  if(pendingRecip){recipId='r'+id;await putReceipt(recipId,pendingRecip);}
  const rec={id,kid:current,type:txType,cat:selCat,note:document.getElementById('txNote').value.trim(),amt,date:Date.now(),recip:recipId};
  const btn=document.getElementById('txOk');btn.disabled=true;setSync('busy','ほぞん中');
  try{
    await apiCall('addTx',rec);
    DATA.tx.push(rec);
    closeTx();render();setSync('ok','つながってるよ');popStamp(txType==='income'?'🌱':'🪙');
    // かくまアプリ連携バナーを消す
    document.getElementById('fromKakuma').classList.remove('on');
  }catch(e){toast('ほぞん しっぱい:'+e.message);setSync('err','つながらない');}
  btn.disabled=false;
}
async function delTx(id){
  if(!confirm('この きろくを けす？'))return;
  const t=DATA.tx.find(x=>x.id===id);
  setSync('busy','ほぞん中');
  try{await apiCall('delTx',{id});if(t&&t.recip)await delReceipt(t.recip);DATA.tx=DATA.tx.filter(x=>x.id!==id);render();setSync('ok','つながってるよ');}
  catch(e){toast('けせなかった:'+e.message);setSync('err','つながらない');}
}

/* ===== 目標 ===== */
function openGoal(){document.getElementById('gName').value='';document.getElementById('gPrice').value='';document.getElementById('gDue').value='';document.getElementById('goalOv').classList.add('on');}
function closeGoal(){document.getElementById('goalOv').classList.remove('on');}
async function saveGoal(){
  const name=document.getElementById('gName').value.trim();
  const price=parseInt(document.getElementById('gPrice').value,10);
  const due=document.getElementById('gDue').value;
  if(!name||!price){alert('なまえと きんがくを 入れてね');return;}
  const g={id:'g'+Date.now()+Math.random().toString(36).slice(2,5),kid:current,name,price,due:due||''};
  setSync('busy','ほぞん中');
  try{await apiCall('addGoal',g);DATA.goals.push(g);closeGoal();render();setSync('ok','つながってるよ');}
  catch(e){toast('ほぞん しっぱい:'+e.message);setSync('err','つながらない');}
}
async function delGoal(id){
  setSync('busy','ほぞん中');
  try{await apiCall('delGoal',{id});DATA.goals=DATA.goals.filter(g=>g.id!==id);render();setSync('ok','つながってるよ');}
  catch(e){toast('けせなかった:'+e.message);setSync('err','つながらない');}
}

/* ===== レシート拡大・スタンプ ===== */
async function showReceipt(rid){const b=await getReceipt(rid);if(!b){toast('この スマホには しゃしんが ないよ');return;}document.getElementById('viewerImg').src=URL.createObjectURL(b);document.getElementById('viewer').classList.add('on');}
function popStamp(emoji){const s=document.getElementById('stamp');s.querySelector('.b').textContent=emoji;s.classList.add('on');setTimeout(()=>s.classList.remove('on'),900);}

/* ===== 初回設定 ===== */
function saveGasUrl(){
  const u=document.getElementById('gasUrl').value.trim();
  if(!u.startsWith('https://script.google.com/')){alert('GASのURL（https://script.google.com/... ）を入れてね');return;}
  GAS_URL=u;localStorage.setItem(GAS_KEY,u);document.getElementById('setup').classList.remove('on');boot();
}

/* =========================================================
   ★ v1.45 新規:URLパラメータ対応(かくまアプリ連携)
   URL例: ?user=K&amount=500&type=in&memo=ママコイン50まい こうかん
   ========================================================= */
function handleUrlParams(){
  const params = new URLSearchParams(window.location.search);
  const user = params.get('user');
  const amount = params.get('amount');
  const typeParam = params.get('type'); // 'in' or 'out'
  const memo = params.get('memo');

  // 1) ユーザー自動切替
  if(user && KIDS.find(k=>k.id===user)){
    current = user;
    applyTheme();
    render();
  }

  // 2) 金額があれば「おかねが入った」モーダル自動オープン + プリセット
  if(amount && parseInt(amount,10) > 0){
    const txType = (typeParam === 'out') ? 'expense' : 'income';

    // バナー表示
    if(txType === 'income'){
      const banner = document.getElementById('fromKakuma');
      document.getElementById('fromKakumaAmt').textContent = '+' + yen(amount) + ' 円';
      banner.classList.add('on');
    }

    // モーダル自動オープン
    setTimeout(()=>{
      openTx(txType);
      document.getElementById('txAmt').value = amount;
      if(memo) document.getElementById('txNote').value = memo;

      // 「もらった」カテゴリを自動選択(incomeの場合)
      if(txType === 'income'){
        const buttons = document.querySelectorAll('#catChips button');
        buttons.forEach(b=>{
          if(b.textContent.includes('もらった')){
            selCat = 'もらった';
            buttons.forEach(x => x.classList.remove('sel'));
            b.classList.add('sel');
          }
        });
      }
    }, 400);

    // URLパラメータをクリア(再リロード時に再オープンしないため)
    if(window.history && window.history.replaceState){
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }
}

/* ===== 起動 ===== */
async function boot(){
  applyTheme();
  await openDB().catch(()=>{});
  if(!GAS_URL){
    document.getElementById('setup').classList.add('on');
    return;
  }
  await pull();
  // ★ v1.45: URLパラメータ処理(かくまアプリ連携)
  handleUrlParams();
}
boot();
</script>
